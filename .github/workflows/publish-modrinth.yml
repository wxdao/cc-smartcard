name: Publish to Modrinth

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_type:
        description: Modrinth version type
        type: choice
        options:
          - release
          - beta
          - alpha
        default: beta

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Resolve NeoGradle cache inputs
        run: python3 scripts/github-workflow.py write-neogradle-cache-env --github-env "${GITHUB_ENV}"

      - name: Restore NeoGradle workspace state
        id: neogradle-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .gradle/repositories
            .gradle/caches/minecraft
            build/neoForm
          key: neogradle-workspace-${{ runner.os }}-mc${{ env.NEOGRADLE_CACHE_MINECRAFT_VERSION }}-neo${{ env.NEOGRADLE_CACHE_NEO_VERSION }}-cct${{ env.NEOGRADLE_CACHE_CCT_VERSION }}-parchment-mc${{ env.NEOGRADLE_CACHE_PARCHMENT_MINECRAFT_VERSION }}-mappings${{ env.NEOGRADLE_CACHE_PARCHMENT_MAPPINGS_VERSION }}-${{ hashFiles('settings.gradle', 'build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            neogradle-workspace-${{ runner.os }}-mc${{ env.NEOGRADLE_CACHE_MINECRAFT_VERSION }}-neo${{ env.NEOGRADLE_CACHE_NEO_VERSION }}-cct${{ env.NEOGRADLE_CACHE_CCT_VERSION }}-parchment-mc${{ env.NEOGRADLE_CACHE_PARCHMENT_MINECRAFT_VERSION }}-mappings${{ env.NEOGRADLE_CACHE_PARCHMENT_MAPPINGS_VERSION }}-

      - name: Resolve publish inputs
        env:
          WORKFLOW_VERSION_TYPE: ${{ inputs.version_type }}
        run: python3 scripts/github-workflow.py write-publish-env --github-env "${GITHUB_ENV}" --event-name "${GITHUB_EVENT_NAME}" --version-type "${WORKFLOW_VERSION_TYPE}"

      - name: Verify tag matches Gradle version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: python3 scripts/github-workflow.py verify-tag --tag "${GITHUB_REF_NAME}"

      - name: Build and run game tests
        run: ./gradlew build runGameTestServer

      - name: Save NeoGradle workspace state
        if: github.ref == 'refs/heads/main' && steps.neogradle-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .gradle/repositories
            .gradle/caches/minecraft
            build/neoForm
          key: neogradle-workspace-${{ runner.os }}-mc${{ env.NEOGRADLE_CACHE_MINECRAFT_VERSION }}-neo${{ env.NEOGRADLE_CACHE_NEO_VERSION }}-cct${{ env.NEOGRADLE_CACHE_CCT_VERSION }}-parchment-mc${{ env.NEOGRADLE_CACHE_PARCHMENT_MINECRAFT_VERSION }}-mappings${{ env.NEOGRADLE_CACHE_PARCHMENT_MAPPINGS_VERSION }}-${{ hashFiles('settings.gradle', 'build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/publish-github-release.py --tag "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}"

      - name: Publish Modrinth version
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_VERSION_TYPE: ${{ env.MODRINTH_VERSION_TYPE }}
        run: ./gradlew modrinth
